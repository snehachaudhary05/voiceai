<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NVIDIA Voice Assistant</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
    header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #76b900;box-shadow:0 2px 20px rgba(118,185,0,.2)}
    .logo{display:flex;align-items:center;gap:12px}
    .logo-icon{width:38px;height:38px;background:#76b900;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo h1{font-size:20px;font-weight:700;color:#fff}
    .logo p{font-size:11px;color:#76b900;margin-top:1px}
    .badges{display:flex;gap:8px}
    .badge{background:rgba(118,185,0,.1);border:1px solid rgba(118,185,0,.3);color:#76b900;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
    #chat-container{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
    #chat-container::-webkit-scrollbar{width:6px}
    #chat-container::-webkit-scrollbar-thumb{background:#76b900;border-radius:3px}
    .message{display:flex;gap:12px;max-width:75%;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .message.user{align-self:flex-end;flex-direction:row-reverse}
    .message.assistant{align-self:flex-start}
    .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .message.user .avatar{background:#1e3a5f}
    .message.assistant .avatar{background:rgba(118,185,0,.2);border:1px solid #76b900}
    .bubble{padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.5}
    .message.user .bubble{background:#1a3a5c;border-bottom-right-radius:4px;color:#e0f0ff}
    .message.assistant .bubble{background:#1a1a2e;border:1px solid rgba(118,185,0,.2);border-bottom-left-radius:4px}
    #welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#555}
    #welcome .icon{font-size:56px}
    #welcome h2{font-size:22px;color:#888}
    #welcome p{font-size:14px;text-align:center;max-width:360px}
    #controls{background:#0f0f1a;border-top:1px solid #222;padding:20px 24px}
    .controls-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;gap:14px}
    #mic-btn{width:60px;height:60px;border-radius:50%;border:none;background:#76b900;color:#000;font-size:24px;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    #mic-btn:hover{background:#8fd400;transform:scale(1.05)}
    #mic-btn.recording{background:#ff4444;animation:pulse 1.2s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,68,68,.6)}70%{box-shadow:0 0 0 18px rgba(255,68,68,0)}100%{box-shadow:0 0 0 0 rgba(255,68,68,0)}}
    #text-input{flex:1;background:#1a1a2e;border:1px solid #333;border-radius:30px;padding:14px 20px;font-size:15px;color:#e0e0e0;outline:none;transition:border .2s}
    #text-input:focus{border-color:#76b900}
    #text-input::placeholder{color:#555}
    #send-btn{width:48px;height:48px;border-radius:50%;border:none;background:#1a3a5c;color:#76b900;font-size:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
    #send-btn:hover{background:#76b900;color:#000}
    #reset-btn{width:44px;height:44px;border-radius:50%;border:1px solid #333;background:transparent;color:#666;font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
    #reset-btn:hover{border-color:#76b900;color:#76b900}
    #status{text-align:center;font-size:12px;color:#555;margin-bottom:10px;min-height:18px}
    #status.active{color:#76b900}
    #status.error{color:#ff6666}
    #confirm-bar{display:none;max-width:800px;margin:0 auto 12px;background:#1a1a2e;border:1px solid rgba(118,185,0,.3);border-radius:16px;padding:10px 16px;align-items:center;gap:10px}
    #confirm-bar.show{display:flex}
    #confirm-text{flex:1;color:#e0e0e0;font-size:14px;line-height:1.4;max-height:60px;overflow-y:auto}
    .confirm-btn{width:42px;height:42px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    #confirm-yes{background:#76b900;color:#000}
    #confirm-yes:hover{background:#8fd400;transform:scale(1.1)}
    #confirm-no{background:#333;color:#ff6666}
    #confirm-no:hover{background:#ff4444;color:#fff;transform:scale(1.1)}
    .thinking{display:flex;gap:4px;padding:12px 16px}
    .thinking span{width:8px;height:8px;background:#76b900;border-radius:50%;animation:bounce 1.2s infinite}
    .thinking span:nth-child(2){animation-delay:.2s}
    .thinking span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.1);opacity:1}}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">&#9889;</div>
    <div><h1>NVIDIA Voice Assistant</h1><p>Powered by NIM Free APIs</p></div>
  </div>
  <div class="badges">
    <span class="badge">Llama 3.3 70B</span>
    <span class="badge">TTS</span>
    <span class="badge">9 Languages</span>
  </div>
</header>

<div id="chat-container">
  <div id="welcome">
    <div class="icon">&#127897;</div>
    <h2>Hi! I am your NVIDIA Voice Assistant</h2>
    <p>Click mic and speak, or type below. I reply in your language!</p>
  </div>
</div>

<div id="controls">
  <div id="status">Ready - click mic to speak or type below</div>
  <div id="confirm-bar">
    <div id="confirm-text"></div>
    <button class="confirm-btn" id="confirm-no" title="Cancel">&#10006;</button>
    <button class="confirm-btn" id="confirm-yes" title="Send">&#10004;</button>
  </div>
  <div class="controls-inner">
    <button id="mic-btn" title="Click to record">&#127897;</button>
    <input id="text-input" type="text" placeholder="Or type your message here..."/>
    <button id="send-btn" title="Send">&#10148;</button>
    <button id="reset-btn" title="Clear chat">&#128260;</button>
  </div>
</div>

<script>
var chatEl     = document.getElementById('chat-container');
var welcome    = document.getElementById('welcome');
var micBtn     = document.getElementById('mic-btn');
var txtInput   = document.getElementById('text-input');
var sendBtn    = document.getElementById('send-btn');
var resetBtn   = document.getElementById('reset-btn');
var statusEl   = document.getElementById('status');
var confirmBar = document.getElementById('confirm-bar');
var confirmTxt = document.getElementById('confirm-text');
var confirmYes = document.getElementById('confirm-yes');
var confirmNo  = document.getElementById('confirm-no');
var busy = false;
var pendingText = '';

function setStatus(msg, cls){ statusEl.textContent = msg; statusEl.className = cls || ''; }

function addMsg(role, text){
  if(welcome) welcome.style.display = 'none';
  var d = document.createElement('div');
  d.className = 'message ' + role;
  d.innerHTML = '<div class="avatar">' + (role==='user'?'U':'A') + '</div><div class="bubble">' + text + '</div>';
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showThinking(){
  if(welcome) welcome.style.display = 'none';
  var d = document.createElement('div');
  d.className = 'message assistant'; d.id = 'thinking';
  d.innerHTML = '<div class="avatar">A</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>';
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
}
function hideThinking(){ var t = document.getElementById('thinking'); if(t) t.remove(); }

function detectLang(t){
  for(var i=0;i<t.length;i++){
    var c = t.charCodeAt(i);
    if(c>=0x0900 && c<=0x097F) return 'hi';
    if(c>=0x4E00 && c<=0x9FFF) return 'zh';
    if(c>=0x3040 && c<=0x30FF) return 'ja';
  }
  return 'en';
}

// Web Speech API for transcription (browser handles encoding natively)

function speakText(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(text);
  utt.rate = 1; utt.pitch = 1; utt.volume = 1;
  utt.onend = function(){ setStatus('Ready - click mic to speak or type'); busy=false; };
  utt.onerror = function(){ setStatus('Ready'); busy=false; };
  window.speechSynthesis.speak(utt);
}

async function sendToAI(text){
  if(busy) return; busy = true;
  addMsg('user', text); showThinking(); setStatus('Thinking...', 'active');
  try{
    var r = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text: text})});
    var d = await r.json();
    if(d.error) throw new Error(d.error);
    hideThinking(); addMsg('assistant', d.text);
    setStatus('Speaking...', 'active');
    speakText(d.text);
  } catch(e){
    hideThinking(); addMsg('assistant', 'Error: '+e.message);
    setStatus('Error - try again', 'error'); busy=false;
  }
}

// Browser Web Speech API with confirm/cancel UI
var recognition = null;
var recording = false;
var spokenText = '';

function getSpeechRecognition(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  var r = new SR();
  r.continuous = false;
  r.interimResults = true;
  r.maxAlternatives = 1;
  return r;
}

function showConfirm(text){
  pendingText = text;
  confirmTxt.textContent = '"' + text + '"';
  confirmBar.classList.add('show');
  setStatus('Review your message — click tick to send or cross to cancel', 'active');
}

function hideConfirm(){
  confirmBar.classList.remove('show');
  pendingText = '';
}

confirmYes.addEventListener('click', function(){
  var text = pendingText;
  hideConfirm();
  if(text) sendToAI(text);
});

confirmNo.addEventListener('click', function(){
  hideConfirm();
  setStatus('Cancelled — click mic to try again');
});

micBtn.addEventListener('click', function(){
  if(recording){
    if(recognition) recognition.stop();
    return;
  }

  recognition = getSpeechRecognition();
  if(!recognition){
    setStatus('Speech recognition not supported — use Chrome or type below', 'error');
    return;
  }

  recording = true;
  spokenText = '';
  micBtn.classList.add('recording');
  micBtn.innerHTML = '&#9632;';
  setStatus('Listening... speak now, click stop when done', 'active');

  recognition.onresult = function(e){
    var transcript = '';
    for(var i=0; i<e.results.length; i++){
      transcript = e.results[i][0].transcript;
    }
    transcript = transcript.trim();
    if(e.results[e.results.length-1].isFinal){
      spokenText = transcript;
    }
    if(transcript) setStatus('"' + transcript + '"', 'active');
  };

  recognition.onerror = function(e){
    console.log('Speech error:', e.error);
    recording = false;
    micBtn.classList.remove('recording');
    micBtn.innerHTML = '&#127897;';
    if(e.error === 'no-speech'){
      setStatus('No speech heard — click mic and speak', 'error');
    } else if(e.error === 'not-allowed'){
      setStatus('Mic permission denied — allow mic in browser settings', 'error');
    } else {
      setStatus('Mic error: ' + e.error, 'error');
    }
  };

  recognition.onend = function(){
    recording = false;
    micBtn.classList.remove('recording');
    micBtn.innerHTML = '&#127897;';
    var text = spokenText.trim();
    if(text){
      showConfirm(text);
    } else {
      setStatus('No speech detected — try again', 'error');
    }
  };

  try{ recognition.start(); }
  catch(e){
    setStatus('Could not start mic: '+e.message, 'error');
    recording = false;
    micBtn.classList.remove('recording');
    micBtn.innerHTML = '&#127897;';
  }
});

sendBtn.addEventListener('click', function(){
  var t = txtInput.value.trim(); if(!t) return;
  txtInput.value = ''; sendToAI(t);
});
txtInput.addEventListener('keydown', function(e){ if(e.key==='Enter') sendBtn.click(); });

resetBtn.addEventListener('click', async function(){
  await fetch('/reset', {method:'POST'});
  chatEl.innerHTML = ''; chatEl.appendChild(welcome);
  welcome.style.display = 'flex'; setStatus('Cleared'); busy=false;
});
</script>
</body>
</html>
